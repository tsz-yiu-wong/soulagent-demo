    <script>
        // Toggle Public Brain
        let isPublic = false;
        function togglePublic() {
            isPublic = !isPublic;
            const btn = document.getElementById('toggle-public-btn');
            const hint = document.getElementById('public-status-hint');
            const meAvatar = document.getElementById('center-me-avatar');
            if (isPublic) {
                btn.innerText = "隐藏我的分身";
                btn.style.background = "#2D2B4D";
                btn.style.boxShadow = "0 4px 0 #1A1930";
                hint.innerText = "当前状态：已公开（全社区可见）";
                meAvatar.classList.remove('is-private');
            } else {
                btn.innerText = "公开我的分身";
                btn.style.background = "#7A5CFF";
                btn.style.boxShadow = "0 4px 0 #5A40CC";
                hint.innerText = "当前状态：私密（仅自己可见）";
                meAvatar.classList.add('is-private');
            }
            // Keep status hint style consistent across private/public states.
            hint.style.color = "#9D85FF";
            hint.style.opacity = "0.85";
            drawShowcaseConnections();
        }

        // Hover Card Logic
        const infoCard = document.getElementById('twin-info-card');
        const cardName = document.getElementById('card-name');
        const cardAvatar = document.getElementById('card-avatar-pill');
        const cardTagsList = document.getElementById('card-tags-list');
        let hoverTimer;
        let meHoverTimer;

        const memberData = {
            '林静': { type: 'twin', role: '交互设计师', skill: '逻辑分析', sim: '92%', bio: '前资深产品经理，现创业者。如果你对 SaaS 增长路径或产品冷启动感兴趣，随时与我的数字分身交流。' },
            '陈博': { type: 'twin', role: '架构师', skill: '分布式系统', sim: '88%', bio: '专注于云原生架构与高并发系统优化。我的分身共享了我对未来技术演进的深度思考。' },
            '苏珊': { type: 'twin', role: '产品经理', skill: '用户洞察', sim: '95%', bio: '热爱挖掘用户背后的真实需求，擅长从琐碎反馈中提炼核心商业价值。' },
            '赵敏': { type: 'twin', role: '心理学家', skill: '共情对话', sim: '97%', bio: '探索 AI 与人类情感的边界，希望通过数字分身提供全天候的情感陪伴与心理疏导。' },
            '王强': { type: 'twin', role: '极客', skill: '代码实现', sim: '80%', bio: '全栈开发程序员。' },
            '李梅': { type: 'twin', role: '教育专家', skill: '知识图谱', sim: '85%', bio: '致力于探索未来教育的无限可能。' },
            '露西': { type: 'twin', role: '数字艺术家', skill: '创意生成', sim: '90%', bio: '用代码捕捉灵魂的色彩。' },
            '大卫': { type: 'twin', role: '科幻作家', skill: '世界观架构', sim: '82%', bio: '在平行时空中寻找真实的逻辑。' },
            '战略大师': { type: 'agent', role: '商业顾问', skill: '战略规划', sim: 'S级', bio: '基于 500+ 商学院经典案例训练。擅长协助进行市场进入分析、竞品解构及五年发展战略规划。' },
            '创意工坊': { type: 'agent', role: '灵感助手', skill: '多模态创作', sim: 'A级', bio: '不仅是文案。我能帮助你进行视觉构思、脚本撰写，甚至协助你进行多维度的灵感碰撞。' },
            '极客助手': { type: 'agent', role: '代码专家', skill: '逻辑审查', sim: 'A级', bio: '专注于代码评审与流程自动化。基于最佳实践库，为您的项目提供近乎零时延的技术建议。' },
            '深度研判': { type: 'agent', role: '市场分析', skill: '数据洞察', sim: 'B级', bio: '实时追踪全球市场动态，提供毫秒级的深度行业报告与趋势预测建议。' },
            '翻译专家': { type: 'agent', role: '语言大师', skill: '多语言同传', sim: 'A级', bio: '打破语言壁垒，连接全球智慧。' },
            '写作助手': { type: 'agent', role: '文字工匠', skill: '风格迁移', sim: 'A级', bio: '让你的每一段文字都充满灵感。' },
            '绘画大师': { type: 'agent', role: '视觉专家', skill: '图像重构', sim: 'S级', bio: '将想象力具象化，创造视觉奇迹。' }
        };

        const typeColors = {
            'twin': { main: '#7A5CFF', light: '#9D85FF' },
            'agent': { main: '#ED64A6', light: '#F687B3' }
        };

        let currentHoverName = "";
        let currentHoverConnected = false;
        const connectedNames = new Set();
        const allMembers = Object.entries(memberData);

        document.querySelectorAll('.twin-avatar.other').forEach(avatar => {
            avatar.addEventListener('mouseenter', (e) => {
                clearTimeout(hoverTimer);
                // Immediately hide the "me" neural panel when hovering other avatars
                clearTimeout(meHoverTimer);
                meNeuralPanel.classList.remove('active');
                const name = avatar.getAttribute('data-name');
                currentHoverName = name;
                const type = avatar.getAttribute('data-type');
                const data = memberData[name] || { role: '成员', skill: '通用', sim: '??%', bio: '暂无简介' };

                cardName.innerText = name;
                document.getElementById('card-type-tag').innerText = type === 'twin' ? 'DIGITAL TWIN' : 'EXPERT AGENT';
                document.getElementById('card-bio').innerText = data.bio;

                // Set theme colors
                const theme = typeColors[type] || typeColors.twin;
                infoCard.style.setProperty('--accent-color', theme.main);
                infoCard.style.setProperty('--accent-color-light', theme.light);

                // Update Avatar logic for the card
                if (type === 'twin') {
                    cardAvatar.innerHTML = avatar.querySelector('svg').outerHTML;
                    cardAvatar.style.background = 'transparent';
                } else {
                    cardAvatar.innerHTML = avatar.querySelector('.agent-icon-bg svg').outerHTML;
                    cardAvatar.style.background = theme.main;
                    cardAvatar.style.padding = '8px';
                }

                // Update Tags
                cardTagsList.innerHTML = `
                    <div class="info-pill highlight">${type === 'twin' ? '相似度 ' + data.sim : '能力等级 ' + data.sim}</div>
                    <div class="info-pill">${data.role}</div>
                    <div class="info-pill">${data.skill}</div>
                `;

                // Button Text
                const isConnected = avatar.getAttribute('data-connected') === 'true';
                currentHoverConnected = isConnected;
                if (isConnected) {
                    document.getElementById('card-action-btn').innerText = `继续与 ${name} 交流`;
                } else {
                    document.getElementById('card-action-btn').innerText = type === 'twin' ? `与 ${name} 交流` : `启用 ${name}`;
                }

                const rect = avatar.getBoundingClientRect();
                infoCard.classList.add('active');

                // Position logic
                const cardWidth = infoCard.offsetWidth;
                const cardHeight = infoCard.offsetHeight;

                let top = rect.top + (rect.height / 2) - (cardHeight / 2);
                let left = rect.right + 20;

                // Keep inside viewport
                if (left + cardWidth > window.innerWidth) {
                    left = rect.left - cardWidth - 20;
                }
                if (top + cardHeight > window.innerHeight) {
                    top = window.innerHeight - cardHeight - 20;
                }
                if (top < 0) top = 20;

                infoCard.style.top = `${top}px`;
                infoCard.style.left = `${left}px`;
            });

            avatar.addEventListener('mouseleave', () => {
                hoverTimer = setTimeout(() => {
                    infoCard.classList.remove('active');
                }, 400);
            });

            // Clicking Avatar also opens chat
            avatar.addEventListener('click', () => {
                const name = avatar.getAttribute('data-name');
                currentHoverName = name;
                currentHoverConnected = avatar.getAttribute('data-connected') === 'true';
                openChatDialog();
            });
        });

        infoCard.addEventListener('mouseenter', () => clearTimeout(hoverTimer));
        infoCard.addEventListener('mouseleave', () => {
            infoCard.classList.remove('active');
        });

        // Center "Me" avatar: disable hover card display
        const meAvatar = document.getElementById('center-me-avatar');
        const meNeuralPanel = document.getElementById('me-neural-panel');
        if (meAvatar && meNeuralPanel) {
            meNeuralPanel.classList.remove('active');
        }

        // Chat Modal Logic
        function openChatDialog() {
            if (!currentHoverName) return;
            document.getElementById('chat-modal-name').innerText = `与 ${currentHoverName} 对话`;

            const body = document.getElementById('chat-modal-body');
            if (currentHoverConnected) {
                body.innerHTML = `
                    <div class="chat-bubble user">上次我们讨论的产品设计方案还有更新吗？</div>
                    <div class="chat-bubble bot">有的，我整理了一些新的洞察，稍后发给你看看。</div>
                `;
            } else {
                body.innerHTML = '';
            }

            document.getElementById('chat-modal').style.display = 'flex';
            infoCard.classList.remove('active');
        }
        function closeChatDialog() {
            document.getElementById('chat-modal').style.display = 'none';
        }
        function sendChatMessage() {
            const input = document.getElementById('chat-modal-input');
            const val = input.value.trim();
            if (val) {
                const body = document.getElementById('chat-modal-body');
                body.innerHTML += `<div class="chat-bubble user">${val}</div>`;
                input.value = "";
                body.scrollTop = body.scrollHeight;
                setTimeout(() => {
                    body.innerHTML += `<div class="chat-bubble bot">收到，我也在尝试思考这里的深层逻辑。</div>`;
                    body.scrollTop = body.scrollHeight;
                }, 800);
            }
        }

        function getAvatarColor(name, type) {
            const colorPool = type === 'agent'
                ? ['#ED64A6', '#9F7AEA', '#4299E1', '#DD6B20', '#48BB78']
                : ['#7A5CFF', '#F6AD55', '#48C0B9', '#ED64A6', '#4299E1'];
            let hash = 0;
            for (let i = 0; i < name.length; i++) {
                hash = name.charCodeAt(i) + ((hash << 5) - hash);
            }
            return colorPool[Math.abs(hash) % colorPool.length];
        }

        function renderMemberDirectory() {
            const grid = document.getElementById('member-directory-grid');
            if (!grid) return;

            connectedNames.clear();
            document.querySelectorAll('.twin-avatar.other[data-connected="true"]').forEach(avatar => {
                const name = avatar.getAttribute('data-name');
                if (name) connectedNames.add(name);
            });

            const typeFilter = document.getElementById('type-filter');
            const roleFilter = document.getElementById('role-filter');
            const skillFilter = document.getElementById('skill-filter');
            const searchInput = document.getElementById('directory-search-input');
            const summary = document.getElementById('member-directory-summary');

            const selectedType = typeFilter ? typeFilter.value : "";
            const selectedRole = roleFilter ? roleFilter.value : "";
            const selectedSkill = skillFilter ? skillFilter.value : "";
            const searchKeyword = searchInput ? searchInput.value.trim().toLowerCase() : "";

            const filteredMembers = allMembers.filter(([name, data]) => {
                const matchesType = !selectedType || data.type === selectedType;
                const matchesRole = !selectedRole || data.role === selectedRole;
                const matchesSkill = !selectedSkill || data.skill === selectedSkill;
                const matchesSearch = !searchKeyword
                    || name.toLowerCase().includes(searchKeyword)
                    || data.role.toLowerCase().includes(searchKeyword)
                    || data.skill.toLowerCase().includes(searchKeyword)
                    || data.bio.toLowerCase().includes(searchKeyword)
                    || (data.type === 'agent' ? '智能体' : '数字分身').includes(searchKeyword);
                return matchesType && matchesRole && matchesSkill && matchesSearch;
            });

            if (summary) {
                const agentCount = filteredMembers.filter(([, data]) => data.type === 'agent').length;
                const twinCount = filteredMembers.filter(([, data]) => data.type === 'twin').length;
                summary.textContent = `数字世界中共有${agentCount}个智能体，${twinCount}个数字分身。`;
            }

            const listHTML = filteredMembers.map(([name, data]) => {
                const typeLabel = data.type === 'agent' ? '智能体' : '数字分身';
                const avatarText = name.slice(0, 2);
                const avatarColor = getAvatarColor(name, data.type);
                const actionText = connectedNames.has(name) ? '继续对话' : '开启对话';
                const avatarInner = data.type === 'twin'
                    ? `<svg viewBox="0 0 100 100" aria-hidden="true">
                        <circle cx="50" cy="35" r="15" fill="#FFFFFF" />
                        <path d="M50 52c-12 0-22 8-22 20v10h44v-10c0-12-10-20-22-20z" fill="#FFFFFF" />
                    </svg>`
                    : avatarText;
                return `
                    <article class="member-directory-card">
                        <div class="member-directory-meta">
                            <div class="member-directory-avatar" style="background:${avatarColor};">${avatarInner}</div>
                            <div class="member-directory-name-wrap">
                                <p class="member-directory-name">${name}<span class="member-directory-type-badge">${typeLabel}</span></p>
                                <span class="member-directory-tag">岗位：${data.role}｜领域：${data.skill}</span>
                            </div>
                        </div>
                        <p class="member-directory-bio">${data.bio}</p>
                        <button class="btn-directory-chat" data-member-name="${name}">${actionText}</button>
                    </article>
                `;
            }).join('');

            grid.innerHTML = listHTML || '<div class="member-directory-bio">暂无符合条件的 Agent / Twin</div>';
            grid.querySelectorAll('.btn-directory-chat').forEach(btn => {
                btn.addEventListener('click', () => {
                    const targetName = btn.getAttribute('data-member-name');
                    currentHoverName = targetName || "";
                    currentHoverConnected = connectedNames.has(targetName);
                    openChatDialog();
                });
            });
        }

        function populateDirectoryFilters() {
            const roleFilter = document.getElementById('role-filter');
            const skillFilter = document.getElementById('skill-filter');
            if (!roleFilter || !skillFilter) return;

            const roles = [...new Set(allMembers.map(([, data]) => data.role))].sort((a, b) => a.localeCompare(b, 'zh-Hans-CN'));
            const skills = [...new Set(allMembers.map(([, data]) => data.skill))].sort((a, b) => a.localeCompare(b, 'zh-Hans-CN'));

            roleFilter.innerHTML = '<option value="">全部岗位</option>' + roles.map(role => `<option value="${role}">${role}</option>`).join('');
            skillFilter.innerHTML = '<option value="">全部领域</option>' + skills.map(skill => `<option value="${skill}">${skill}</option>`).join('');
        }

        function bindDirectoryFilters() {
            const typeFilter = document.getElementById('type-filter');
            const roleFilter = document.getElementById('role-filter');
            const skillFilter = document.getElementById('skill-filter');
            const searchInput = document.getElementById('directory-search-input');
            if (typeFilter) typeFilter.addEventListener('change', renderMemberDirectory);
            if (roleFilter) roleFilter.addEventListener('change', renderMemberDirectory);
            if (skillFilter) skillFilter.addEventListener('change', renderMemberDirectory);
            if (searchInput) searchInput.addEventListener('input', renderMemberDirectory);
        }

        // Connections Drawing for Showcase
        function drawShowcaseConnections() {
            const svg = document.getElementById('connection-lines-svg');
            const container = document.getElementById('avatars-container-large');
            const meAvatar = document.getElementById('center-me-avatar');

            if (!svg || !container || !meAvatar) return;
            svg.innerHTML = '';

            const meRect = meAvatar.getBoundingClientRect();
            const containerRect = container.getBoundingClientRect();
            const startX = meRect.left - containerRect.left + meRect.width / 2;
            const startY = meRect.top - containerRect.top + meRect.height / 2;

            const others = container.querySelectorAll('.twin-avatar.other[data-connected="true"]');

            others.forEach(node => {
                const nodeRect = node.getBoundingClientRect();
                const endX = nodeRect.left - containerRect.left + nodeRect.width / 2;
                const endY = nodeRect.top - containerRect.top + nodeRect.height / 2;

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', startX);
                line.setAttribute('y1', startY);
                line.setAttribute('x2', endX);
                line.setAttribute('y2', endY);
                line.setAttribute('stroke', isPublic ? 'rgba(157, 133, 255, 0.4)' : 'rgba(160, 174, 192, 0.5)');
                line.setAttribute('stroke-width', '2');
                line.setAttribute('stroke-dasharray', '5,5');
                svg.appendChild(line);
            });
        }

        // Neural Network Connections
        function drawConnections() {
            const svg = document.getElementById('network-svg');
            const container = document.getElementById('neural-network');
            const nodes = container.querySelectorAll('.graph-node');
            const rect = container.getBoundingClientRect();

            svg.innerHTML = ''; // Clear previous

            // Connections: node pairs (source_id, target_id)
            const connections = [
                [1, 2], [1, 3], [1, 4], [1, 5], [1, 6], [1, 7], [1, 8],
                [2, 6], [5, 6], [4, 7], [3, 8], [2, 5], [4, 5]
            ];

            connections.forEach(([sId, tId]) => {
                const sNode = container.querySelector(`[data-id="${sId}"]`);
                const tNode = container.querySelector(`[data-id="${tId}"]`);

                if (sNode && tNode) {
                    const x1 = sNode.offsetLeft + sNode.offsetWidth / 2;
                    const y1 = sNode.offsetTop + sNode.offsetHeight / 2;
                    const x2 = tNode.offsetLeft + tNode.offsetWidth / 2;
                    const y2 = tNode.offsetTop + tNode.offsetHeight / 2;

                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', x1);
                    line.setAttribute('y1', y1);
                    line.setAttribute('x2', x2);
                    line.setAttribute('y2', y2);
                    line.setAttribute('stroke', 'rgba(157, 133, 255, 0.2)');
                    line.setAttribute('stroke-width', '1');
                    svg.appendChild(line);
                }
            });
        }

        // Initialize connections on load/resize
        window.addEventListener('load', () => {
            drawShowcaseConnections();
            populateDirectoryFilters();
            bindDirectoryFilters();
            renderMemberDirectory();
        });
        window.addEventListener('resize', () => {
            drawShowcaseConnections();
            if (meNeuralPanel.classList.contains('active')) {
                drawConnections();
            }
        });
    </script>
    <script src="navigation.js"></script>
</body>
