<html lang="zh-CN" class="layout-fixed">

        /* Custom styles for metaverse */
        body {
            margin: 0;
            overflow: hidden;
            background: #000000;
            background: radial-gradient(ellipse at center, #151525 0%, #000000 100%);
            color: #fff;
            font-family: 'Lexend', sans-serif;
            height: 100vh;
        }

        .top-nav {
            position: relative;
            z-index: 100;
            background: transparent;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        /* Floating Cards View */

        #floating-view {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: all 1.2s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .center-content {
            text-align: center;
            z-index: 10;
            max-width: 800px;
            padding: 0 20px;
            pointer-events: none;
            transition: all 0.8s ease;
        }

        .center-content h1 {
            font-size: 4.5rem;
            font-weight: 800;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #FFFFFF 0%, #E9E6FF 50%, #9D85FF 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 40px rgba(157, 133, 255, 0.4);
            letter-spacing: -1px;
        }

        .center-content p {
            font-size: 1.25rem;
            line-height: 1.6;
            color: #CBD5E0;
            margin-bottom: 40px;
            font-weight: 400;
        }

        .btn-explore {
            pointer-events: auto;
            background: linear-gradient(135deg, #7A5CFF 0%, #9D85FF 100%);
            color: white;
            border: none;
            padding: 16px 48px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(122, 92, 255, 0.4);
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-explore:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 40px rgba(122, 92, 255, 0.6);
        }

        /* Floating Cards & Grid Cards */
        .floating-card, .dark-expert-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 16px;
            width: 260px;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.05);
        }

        .floating-card {
            position: absolute;
            animation: float-animation infinite ease-in-out alternate;
        }

        .dark-expert-card {
            width: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        @keyframes float-animation {
            0% { transform: translateY(0px) translateX(0px); }
            50% { transform: translateY(-15px) translateX(8px); }
            100% { transform: translateY(10px) translateX(-10px); }
        }

        .floating-card:hover, .dark-expert-card:hover {
            transform: scale(1.08) translateY(-5px) !important;
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(255, 255, 255, 0.1), inset 0 0 20px rgba(255, 255, 255, 0.15);
            z-index: 20;
            background: rgba(255, 255, 255, 0.1);
        }

        .dark-expert-card .btn-talk {
            margin-top: auto;
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
        }

        .dark-expert-card:hover .btn-talk {
            background: linear-gradient(135deg, #7A5CFF 0%, #9D85FF 100%);
            border-color: transparent;
            color: white;
            box-shadow: 0 4px 15px rgba(122, 92, 255, 0.4);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .card-avatar-wrapper {
            position: relative;
            width: 46px;
            height: 46px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
        }

        .card-avatar {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            color: white;
            font-weight: 800;
            padding-bottom: 6px;
        }

        .ai-badge {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(157, 133, 255, 0.95);
            color: white;
            font-size: 0.45rem;
            font-weight: 800;
            padding: 2px 0;
            text-align: center;
            line-height: 1.1;
            backdrop-filter: blur(2px);
            white-space: nowrap;
        }

        .card-info {
            flex: 1;
        }

        .card-name {
            font-size: 1.05rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 2px;
        }

        .card-sub {
            font-size: 0.75rem;
            color: #A0AEC0;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .card-tag {
            padding: 4px 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 6px;
            font-size: 0.65rem;
            font-weight: 700;
        }

        .card-desc {
            font-size: 0.8rem;
            color: #CBD5E0;
            line-height: 1.5;
            margin-top: 10px;
            margin-bottom: 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- Dark Mode Chat List View --- */
        #chat-list-view {
            display: none;
            opacity: 0;
            position: absolute;
            top: 60px; /* height of nav */
            left: 0;
            width: 100vw;
            height: calc(100vh - 60px);
            background: transparent;
            z-index: 50;
            color: #E2E8F0;
            transition: opacity 0.8s ease;
        }

        .dark-dashboard {
            display: grid;
            grid-template-columns: 320px 1fr;
            height: 100%;
        }

        .dark-sidebar {
            background: rgba(10, 10, 15, 0.6);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            padding: 20px;
            overflow-y: auto;
        }

        .dark-main {
            display: flex;
            flex-direction: column;
            background: transparent;
            position: relative;
            overflow-y: auto;
        }

        .conv-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        .dark-conv-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid transparent;
        }

        .dark-conv-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateX(4px);
        }

        .dark-conv-item.active {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.05);
        }
        
        .dark-conv-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            font-size: 1.1rem;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .dark-conv-info .conv-name {
            color: #fff;
            font-size: 0.95rem;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .dark-conv-info .conv-preview {
            color: #A0AEC0;
            font-size: 0.75rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .dark-square-header {
            padding: 25px 40px;
            background: rgba(15, 15, 25, 0.7);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            gap: 16px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .dark-expert-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            padding: 24px 40px;
        }

        .dark-search-bar {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            padding: 12px 16px;
            border-radius: 12px;
            width: 100%;
            outline: none;
            transition: all 0.3s;
        }
        .dark-search-bar:focus {
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.05);
        }

        /* Explosion / Transition Animation classes */
        .zoom-out-fade {
            transform: scale(3) translateZ(100px);
            opacity: 0;
            filter: blur(20px);
        }
        
        .fade-in {
            opacity: 1 !important;
        }
        
        .bg-gradient-1 { background: linear-gradient(135deg, #FF7F66 0%, #E66A52 100%); }
        .bg-gradient-2 { background: linear-gradient(135deg, #48C0B9 0%, #3AA19B 100%); }
        .bg-gradient-3 { background: linear-gradient(135deg, #9D85FF 0%, #7A5CFF 100%); }
        .bg-gradient-4 { background: linear-gradient(135deg, #F6AD55 0%, #ED8936 100%); }
        .bg-gradient-5 { background: linear-gradient(135deg, #ED64A6 0%, #D53F8C 100%); }
        
        .suggestion-chips {
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
            overflow-x: auto;
            padding: 5px 2px; /* Added vertical padding for hover animation */
        }
        .suggestion-chips::-webkit-scrollbar {
            height: 4px;
        }
        .suggestion-chips::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        .suggestion-chip {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #A0AEC0;
            border-radius: 20px;
            font-size: 0.85rem;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.3s;
        }
        .suggestion-chip:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            color: #fff;
            transform: translateY(-2px);
        }

    </style>
</head>

            { name: "陈博", sub: "智源研究院 · 工程师", desc: "拥有深厚的自然语言处理背景，致力于开发更高效的大规模预训练模型底座。", icon: "👨‍🔬", tags: ["自然语言处理", "预训练"], bg: "bg-gradient-1", left: "82vw", top: "42vh", delay: "-3s", dur: "10s", questions: ["下一代NLP模型的核心演进方向？", "如何优化大模型预训练的算力消耗？", "中文语料质量提升有哪些方案？"] },
            { name: "苏珊", sub: "麻省理工 · 教授", desc: "将认知科学原理应用于机器人学，探索赋予机器人类级别灵巧度的方法。", icon: "👩‍🏫", tags: ["机器人", "认知科学"], bg: "bg-gradient-2", left: "3vw", top: "45vh", delay: "-7s", dur: "12s", questions: ["认知科学如何启发机器人运动控制？", "人类灵巧手的控制逻辑能否被模拟？", "机器人的“常识”学习路径是什么？"] },
            { name: "赵敏", sub: "加州伯克利 · 博士后", desc: "主攻深度强化学习与运筹优化在复杂工业控制系统中的应用与落地。", icon: "👩‍💻", tags: ["强化学习", "运筹优化"], bg: "bg-gradient-3", left: "35vw", top: "82vh", delay: "-9s", dur: "14s", questions: ["强化学习在工业落地中的难点？", "如何结合运筹优化提高决策效率？", "仿真与实测差距如何缩小？"] },
            { name: "王强", sub: "上海交大 · 研究员", desc: "研究大规模分布式深度学习系统架构，解决超大参数量模型的训练瓶颈。", icon: "👨‍💼", tags: ["深度学习", "分布式"], bg: "bg-gradient-4", left: "55vw", top: "80vh", delay: "-2s", dur: "11s", questions: ["大规模训练中的通信瓶颈如何解决？", "异构计算芯片的调度优化策略？", "千亿级模型的并行化方案对比？"] }
        ];

        // Initialization
        document.addEventListener('DOMContentLoaded', () => {
            initStars();
            renderFloatingCards();
            renderListCards();
            renderSidebarList();
        });

        // 0. Starry Background
        function initStars() {
            const canvas = document.getElementById('stars-canvas');
            const ctx = canvas.getContext('2d');
            let width, height;
            let stars = [];

            function resize() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                initStarsArray();
            }

            function initStarsArray() {
                stars = [];
                const numStars = Math.floor((width * height) / 1500); // density
                for (let i = 0; i < numStars; i++) {
                    stars.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        radius: Math.random() * 1.5 + 0.5,
                        speed: Math.random() * 0.15 + 0.05,
                        twinkleSpeed: Math.random() * 0.003 + 0.001,
                        twinklePhase: Math.random() * Math.PI * 2
                    });
                }
            }

            function draw() {
                ctx.clearRect(0, 0, width, height);
                
                stars.forEach(star => {
                    // Twinkling effect
                    const opacity = Math.sin(Date.now() * star.twinkleSpeed + star.twinklePhase) * 0.5 + 0.5;
                    ctx.fillStyle = `rgba(255, 255, 255, ${opacity * 0.8})`;
                    
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Move star slowly upwards
                    star.y -= star.speed;
                    if (star.y < 0) {
                        star.y = height;
                        star.x = Math.random() * width;
                    }
                });
                
                requestAnimationFrame(draw);
            }

            window.addEventListener('resize', resize);
            resize();
            draw();
        }

        // 1. Render Floating Cards
        function renderFloatingCards() {
            const container = document.getElementById('floating-view');
            
            experts.forEach((expert) => {
                const card = document.createElement('div');
                card.className = 'floating-card';
                card.style.left = expert.left;
                card.style.top = expert.top;
                card.style.animationDelay = expert.delay;
                card.style.animationDuration = expert.dur;

                card.innerHTML = `
                    <div class="card-header">
                        <div class="card-avatar-wrapper">
                            <div class="card-avatar ${expert.bg}">${expert.icon}</div>
                            <span class="ai-badge">AI分身</span>
                        </div>
                        <div class="card-info">
                            <div class="card-name">${expert.name}</div>
                            <div class="card-sub">${expert.sub}</div>
                        </div>
                    </div>
                    <div class="card-tags">
                        ${expert.tags.map(t => `<span class="card-tag">${t}</span>`).join('')}
                    </div>
                    <p class="card-desc">${expert.desc}</p>
                `;
                
                card.onclick = () => {
                    enterMetaverse();
                    showChat(expert.name, expert.icon, expert.sub, expert.bg);
                };
                container.appendChild(card);
            });
        }

        // 2. Render List Cards
        function renderListCards() {
            const grid = document.getElementById('dark-expert-grid');
            grid.innerHTML = '';
            
            experts.forEach((expert) => {
                const card = document.createElement('div');
                card.className = 'dark-expert-card';
                card.onclick = () => showChat(expert.name, expert.icon, expert.sub, expert.bg);

                card.innerHTML = `
                    <div class="card-header">
                        <div class="card-avatar-wrapper">
                            <div class="card-avatar ${expert.bg}">${expert.icon}</div>
                            <span class="ai-badge">AI分身</span>
                        </div>
                        <div class="card-info">
                            <div class="card-name">${expert.name}</div>
                            <div class="card-sub">${expert.sub}</div>
                        </div>
                    </div>
                    <div class="card-tags">
                        ${expert.tags.map(t => `<span class="card-tag">${t}</span>`).join('')}
                    </div>
                    <p class="card-desc">${expert.desc}</p>
                    <button class="btn-talk" onclick="event.stopPropagation(); showChat('${expert.name}', '${expert.icon}', '${expert.sub}', '${expert.bg}')">与ta交流</button>
                `;
                
                grid.appendChild(card);
            });
        }

        // 3. Render Sidebar Conversions
        function renderSidebarList() {
            const container = document.getElementById('conv-list-container');
            container.innerHTML = '';
            
            // Just take a few experts for the sidebar preview
            const previews = ["关于模型训练有什么建议吗？", "是否可以用于3D生成？", "如何解决注意力衰减问题？", "有关安全对齐的最佳实践？"];
            
            experts.slice(0, 4).forEach((expert, i) => {
                const item = document.createElement('div');
                item.className = 'dark-conv-item' + (i === 0 ? ' active' : '');
                item.onclick = () => showChat(expert.name, expert.icon, expert.sub, expert.bg);
                
                item.innerHTML = `
                    <div class="dark-conv-avatar ${expert.bg}">${expert.name.charAt(0)}</div>
                    <div class="dark-conv-info">
                        <div class="conv-name">${expert.name}</div>
                        <div class="conv-preview">${previews[i % previews.length]}</div>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        // Animation transition to chat list view
        function enterMetaverse() {
            const floatingView = document.getElementById('floating-view');
            const chatListView = document.getElementById('chat-list-view');
            
            floatingView.classList.add('zoom-out-fade');
            
            setTimeout(() => {
                chatListView.style.display = 'block';
                void chatListView.offsetWidth; // Trigger reflow
                chatListView.classList.add('fade-in');
            }, 600);
            
            setTimeout(() => {
                floatingView.style.display = 'none';
            }, 1200);
        }

        // Show Chat Interface
        function showChat(name, icon, title, bgClass) {
            document.getElementById('dark-square-view').style.display = 'none';
            document.getElementById('dark-chat-view').style.display = 'flex';
            
            // Update Headers
            document.getElementById('current-expert-name').innerText = name;
            const headerIcon = document.getElementById('chat-header-icon');
            headerIcon.innerText = icon;
            headerIcon.className = 'card-avatar ' + bgClass;
            document.getElementById('current-expert-title').innerText = title;

            // Reset Chat Area
            const chatArea = document.querySelector('.dark-chat-area');
            chatArea.innerHTML = `
                <div style="text-align: center; color: #A0AEC0; font-size: 0.8rem; margin-bottom: 10px;">
                    —— 已连接到 <span style="color: #fff; font-weight: 800;">AI 专家广场</span>，所有回答由数字大脑基于专家知识库生成 ——
                </div>
                <div class="chat-msg" style="display: flex;">
                    <div style="background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; padding: 14px 20px; border-radius: 16px; border-bottom-left-radius: 4px; max-width: 600px; line-height: 1.6; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
                        你好！我是${name}。请问关于${title.split('·')[1] || '相关领域'}有什么我可以帮你的吗？
                    </div>
                </div>
            `;

            // Update Suggestions
            const expert = experts.find(e => e.name === name);
            const suggestionContainer = document.getElementById('suggestion-container');
            suggestionContainer.innerHTML = '';
            if (expert && expert.questions) {
                expert.questions.forEach(q => {
                    const chip = document.createElement('div');
                    chip.className = 'suggestion-chip';
                    chip.innerText = q;
                    chip.onclick = () => useSuggestion(q);
                    suggestionContainer.appendChild(chip);
                });
            }
            
            // Update Active State in Sidebar
            document.querySelectorAll('.dark-conv-item').forEach(el => {
                el.classList.remove('active');
                if (el.querySelector('.conv-name').innerText === name) {
                    el.classList.add('active');
                }
            });
        }

        function useSuggestion(text) {
            sendMessage(text);
        }

        function sendMessage(explicitText) {
            const input = document.getElementById('chat-input');
            const messageText = explicitText || input.value.trim();
            if (messageText === '') return;
            
            const chatArea = document.querySelector('.dark-chat-area');
            
            // Create user message bubble
            const msgDiv = document.createElement('div');
            msgDiv.className = 'chat-msg user';
            msgDiv.style.display = 'flex';
            msgDiv.style.justifyContent = 'flex-end';
            msgDiv.style.alignSelf = 'flex-end';
            msgDiv.innerHTML = `
                <div style="background: linear-gradient(135deg, #7A5CFF 0%, #9D85FF 100%); color: #fff; padding: 14px 20px; border-radius: 16px; border-bottom-right-radius: 4px; max-width: 600px; line-height: 1.6; box-shadow: 0 4px 15px rgba(122, 92, 255, 0.3);">
                    ${messageText}
                </div>
            `;
            chatArea.appendChild(msgDiv);
            
            // Scroll to bottom
            chatArea.scrollTop = chatArea.scrollHeight;

            // Clear input if we used it
            if (!explicitText) {
                input.value = '';
            }
        }

        // Add Enter listener
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && document.activeElement.id === 'chat-input') {
                sendMessage();
            }
        });

        // Show Square Interface
        function showSquare() {
            document.getElementById('dark-square-view').style.display = 'flex';
            document.getElementById('dark-chat-view').style.display = 'none';
            
            document.querySelectorAll('.dark-conv-item').forEach(el => el.classList.remove('active'));
        }
    </script>
</body>
