<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoulClaw - 懂你的专属智能体</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-color: #F37021;
            --primary-light: #FF9F45;
            --primary-dark: #D15918;
            --bg-color: #ffffff;
            --text-main: #1A1A1A;
            --text-secondary: #666666;
            --card-bg: rgba(255, 255, 255, 0.8);
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Background Elements */
        .bg-blobs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: move 20s infinite alternate;
        }

        .blob-1 {
            width: 500px;
            height: 500px;
            background: var(--primary-color);
            top: -100px;
            right: -100px;
        }

        .blob-2 {
            width: 400px;
            height: 400px;
            background: #FFD2A0;
            bottom: -50px;
            left: -50px;
            animation-delay: -5s;
        }

        @keyframes move {
            from {
                transform: translate(0, 0) scale(1);
            }

            to {
                transform: translate(50px, 50px) scale(1.1);
            }
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 4rem 1.5rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            margin-bottom: 4rem;
            animation: fadeInUp 0.8s ease-out forwards;
            transition: margin-bottom 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hero h1 {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(3rem, 10vw, 4.5rem);
            font-weight: 800;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, var(--text-main) 0%, var(--primary-dark) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .hero p {
            font-size: clamp(1.1rem, 4vw, 1.35rem);
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto;
            font-weight: 500;
            max-height: 150px;
            opacity: 1;
            overflow: hidden;
        }

        /* Features Section */
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            width: 100%;
            margin-bottom: 4rem;
        }

        .feature-card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 24px;
            border: 1px solid rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(10px);
            transition: var(--transition);
            animation: fadeInUp 0.8s ease-out forwards;
            opacity: 0;
        }

        .feature-card:nth-child(1) {
            animation-delay: 0.2s;
        }

        .feature-card:nth-child(2) {
            animation-delay: 0.3s;
        }

        .feature-card:hover {
            transform: translateY(-10px);
            background: white;
            box-shadow: 0 20px 40px rgba(243, 112, 33, 0.08);
            border-color: rgba(243, 112, 33, 0.2);
        }

        .feature-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, rgba(243, 112, 33, 0.1) 0%, rgba(243, 112, 33, 0.05) 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            color: var(--primary-color);
        }

        .feature-card h3 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--text-main);
        }

        .feature-card p {
            font-size: 1rem;
            color: var(--text-secondary);
            line-height: 1.7;
        }



        /* Action Button */
        .cta-section {
            animation: fadeInUp 0.8s ease-out forwards;
            animation-delay: 0.6s;
            opacity: 0;
        }

        .claim-button {
            display: inline-block;
            padding: 1.25rem 3rem;
            font-size: 1.2rem;
            font-weight: 600;
            color: white;
            text-decoration: none;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-light) 100%);
            border-radius: 100px;
            transition: var(--transition);
            box-shadow: 0 10px 30px rgba(243, 112, 33, 0.3);
            border: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .claim-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: 0.6s;
        }

        .claim-button:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 15px 40px rgba(243, 112, 33, 0.5);
        }

        .claim-button:hover::before {
            left: 100%;
        }

        .claim-button:active {
            transform: scale(0.98);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* State Transitions */
        .hero h1,
        .hero p {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hero.shrink {
            margin-bottom: 2rem;
        }

        .hero.shrink h1 {
            margin-bottom: 0;
        }

        .hero.shrink p {
            opacity: 0;
            max-height: 0;
            margin: 0;
            padding: 0;
        }

        .content-area {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .features {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 1;
            transform: translateY(0) scale(1);
            width: 100%;
        }

        .features.hide {
            opacity: 0;
            transform: translateY(-20px) scale(0.95);
            pointer-events: none;
            position: absolute;
        }

        .login-box {
            position: absolute;
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 24px;
            border: 1px solid rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(10px);
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            z-index: 10;
        }

        .login-box.show {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
            position: relative;
            margin-bottom: 2.5rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 1rem;
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            background: rgba(255, 255, 255, 0.9);
            transition: var(--transition);
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(243, 112, 33, 0.1);
        }

        .verify-code-wrapper {
            display: flex;
            gap: 0.5rem;
        }

        .verify-code-wrapper input {
            flex: 1;
            min-width: 0;
        }

        .send-code-btn {
            padding: 0 1rem;
            border: 1px solid var(--primary-color);
            background: transparent;
            color: var(--primary-color);
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
        }

        .send-code-btn:hover {
            background: var(--primary-color);
            color: white;
        }



        @media (max-width: 768px) {
            .container {
                padding: 2rem 1rem;
            }

            .hero h1 {
                font-size: 2.5rem;
            }

            .features {
                gap: 1.5rem;
            }

            .feature-card {
                padding: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container">
        <header class="hero">
            <h1>SoulAgent</h1>
            <p>你的AI全能伙伴，连接数字智慧世界。</p>
        </header>

        <div class="content-area">
            <section class="features">
                <div class="feature-card">
                    <div class="feature-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                    </div>
                    <h3>专属伙伴</h3>
                    <p>聊聊天、查资料、理思路，生活里的大事小事，<strong>它都能搭把手</strong>。记得你的习惯，理解你的想法，甚至<strong>比你更懂你自己</strong>。
                    </p>
                </div>

                <div class="feature-card">
                    <div class="feature-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="3" y1="9" x2="21" y2="9"></line>
                            <line x1="3" y1="15" x2="21" y2="15"></line>
                            <line x1="9" y1="3" x2="9" y2="21"></line>
                            <line x1="15" y1="3" x2="15" y2="21"></line>
                        </svg>
                    </div>
                    <h3>数字空间</h3>
                    <p>汇聚<strong>智源学者</strong>与<strong>权威科学家</strong>的AI分身，让<strong>跨越时空的即时对话</strong>成为可能。无论身处何地，<strong>顶尖智慧与洞察</strong>都触手可及。</p>
                </div>
            </section>

            <div class="login-box">
                <div class="input-group">
                    <label>手机号码</label>
                    <input type="tel" placeholder="请输入手机号" pattern="[0-9]*">
                </div>
                <div class="input-group">
                    <label>验证码</label>
                    <div class="verify-code-wrapper">
                        <input type="text" placeholder="输入验证码">
                        <button type="button" class="send-code-btn">获取验证码</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="cta-section">
            <button class="claim-button" onclick="showLogin()">立即体验</button>
        </div>
    </div>

    <script>
        function showLogin() {
            document.querySelector('.hero').classList.add('shrink');
            document.querySelector('.features').classList.add('hide');
            document.querySelector('.login-box').classList.add('show');

            const btn = document.querySelector('.claim-button');
            btn.textContent = '登录 / 注册';
            btn.onclick = function () {
                window.location.href = 'survey.html';
            };
        }
    </script>
</body>

</html>
