<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专家绑定 - SoulAgent</title>
    <style>
        :root {
            --primary-color: #FF7A00;
            --primary-hover: #E66E00;
            --bg-color: #000000;
            --text-color: #FFFFFF;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(255, 122, 0, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 100% 0%, rgba(255, 122, 0, 0.05) 0%, transparent 30%);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary-color);
            filter: blur(150px);
            opacity: 0.15;
            z-index: -1;
            border-radius: 50%;
            animation: pulse 8s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1) translate(-10%, -10%); opacity: 0.1; }
            100% { transform: scale(1.2) translate(10%, 10%); opacity: 0.2; }
        }

        .section {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 500px;
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .section.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Login Section --- */
        .login-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .login-card h2 {
            margin-bottom: 2.5rem;
            font-size: 1.75rem;
            font-weight: 600;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            margin-bottom: 1.5rem;
            width: 100%;
        }

        .input-group input {
            width: 100%;
            padding: 1.1rem 1.5rem;
            font-size: 1.05rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 122, 0, 0.3);
            border-radius: 12px;
            color: white;
            outline: none;
            transition: all 0.3s;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .input-group input:focus {
            border-color: var(--primary-color);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(255, 122, 0, 0.2);
        }

        .code-group {
            display: flex;
            gap: 10px;
        }

        .code-group input {
            flex: 1;
            min-width: 0;
        }

        .get-code-btn {
            padding: 0 1.2rem;
            font-size: 0.95rem;
            color: var(--primary-color);
            background: transparent;
            border: 1px solid var(--primary-color);
            border-radius: 12px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
            font-weight: 600;
        }

        .get-code-btn:hover {
            background: rgba(255, 122, 0, 0.1);
        }

        .get-code-btn:active {
            background: rgba(255, 122, 0, 0.2);
        }

        .primary-button {
            display: inline-block;
            width: 100%;
            padding: 1.1rem;
            font-size: 1.15rem;
            font-weight: 600;
            color: white;
            text-decoration: none;
            background: linear-gradient(135deg, var(--primary-color) 0%, #FF9F45 100%);
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(255, 122, 0, 0.3);
            margin-top: 1rem;
        }

        .primary-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 122, 0, 0.4);
        }

        .primary-button:active {
            transform: translateY(0);
        }

        /* --- Loading Section --- */
        .avatar-container {
            position: relative;
            width: 160px;
            height: 160px;
            margin-bottom: 2.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .avatar-mask {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.05);
            border: 2px dashed rgba(255, 122, 0, 0.5);
            padding: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: spinBorder 8s linear infinite;
        }

        @keyframes spinBorder {
            100% { transform: rotate(360deg); }
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background-color: #222;
        }

        .avatar-img-wrapper {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            animation: reverseSpin 8s linear infinite;
        }

        @keyframes reverseSpin {
            100% { transform: rotate(-360deg); }
        }

        /* Top-down wipe effect for loading */
        .loading-wipe {
            animation: wipeDown 3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes wipeDown {
            0% { clip-path: inset(0 0 100% 0); filter: brightness(0.5) blur(4px); }
            100% { clip-path: inset(0 0 0 0); filter: brightness(1) blur(0); }
        }

        .loading-text {
            font-size: 1.25rem;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 2px;
            animation: pulseText 1.5s ease-in-out infinite alternate;
        }

        @keyframes pulseText {
            from { opacity: 0.5; }
            to { opacity: 1; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        }

        /* --- Result Section --- */
        
        .result-layout .avatar-mask {
            border: 2px solid var(--primary-color);
            box-shadow: 0 0 35px rgba(255, 122, 0, 0.4);
            animation: none; /* Stop spinning when done */
        }
        
        .result-layout .avatar-img-wrapper {
            animation: none;
        }

        .bubbles-wrapper {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .bubble {
            position: absolute;
            opacity: 0;
            animation: popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            z-index: 10;
        }

        .bubble-inner {
            background: rgba(30, 30, 30, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 122, 0, 0.4);
            padding: 0.9rem 1.4rem;
            border-radius: 20px;
            font-size: 0.95rem;
            color: #fff;
            white-space: nowrap;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            animation: floatUpDown 4s ease-in-out infinite alternate;
            position: relative;
            letter-spacing: 0.5px;
        }

        .bubble-inner::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            background: rgba(30, 30, 30, 0.7);
            border-right: 1px solid rgba(255, 122, 0, 0.4);
            border-bottom: 1px solid rgba(255, 122, 0, 0.4);
            backdrop-filter: blur(16px);
            transform: rotate(45deg);
        }

        /* Positioning bubbles */
        .bubble-1 { top: -80px; left: -220px; animation-delay: 0.2s; }
        .bubble-1 .bubble-inner::after { bottom: -7px; right: 25px; }
        .bubble-1 .bubble-inner { animation-delay: 0s; }

        .bubble-2 { top: 80px; right: -280px; animation-delay: 1s; }
        .bubble-2 .bubble-inner::after { left: -7px; top: 50%; transform: translateY(-50%) rotate(135deg); }
        .bubble-2 .bubble-inner { animation-delay: -1.5s; }

        .bubble-3 { bottom: -110px; left: -200px; animation-delay: 1.8s; }
        .bubble-3 .bubble-inner::after { top: -7px; right: 80px; transform: rotate(-135deg); }
        .bubble-3 .bubble-inner { animation-delay: -3s; }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.3) translateY(30px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes floatUpDown {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-15px); }
        }

        .view-btn {
            margin-top: 10rem;
            width: auto;
            min-width: 260px;
            padding: 1.25rem 2.5rem;
            border-radius: 100px;
            opacity: 0;
            animation: fadeIn 1s ease-out 2.8s forwards;
        }
    </style>
</head>
<body>
    <div class="glow"></div>

    <!-- Login Section -->
    <div id="login-section" class="section active">
        <div class="login-card">
            <h2>绑定小明博士的AI分身</h2>
            <div class="input-group">
                <input type="tel" id="phone" placeholder="请输入手机号">
            </div>
            <div class="input-group code-group">
                <input type="text" id="code" placeholder="请输入验证码">
                <button type="button" class="get-code-btn" id="get-code-btn">获取验证码</button>
            </div>
            <button id="bind-btn" class="primary-button">确认绑定</button>
        </div>
    </div>

    <!-- Loading Section -->
    <div id="loading-section" class="section">
        <div class="avatar-container">
            <div class="avatar-mask">
                <div class="avatar-img-wrapper loading-wipe" id="loading-avatar-wrapper">
                    <!-- Standard placeholder avatar -->
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=AsianHappy&hairColor=2c1b18&skinColor=edb98a&mouth=smile,twinkle&eyes=happy,wink&backgroundColor=ffdfbf" alt="Expert Avatar" class="avatar-img">
                </div>
            </div>
        </div>
        <p class="loading-text">绑定中...</p>
    </div>

    <!-- Result Section -->
    <div id="result-section" class="section result-layout">
        <div class="avatar-container">
            <div class="avatar-mask">
                <div class="avatar-img-wrapper">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=AsianHappy&hairColor=2c1b18&skinColor=edb98a&mouth=smile,twinkle&eyes=happy,wink&backgroundColor=ffdfbf" alt="Expert Avatar" class="avatar-img">
                </div>
            </div>
            
            <div class="bubbles-wrapper">
                <div class="bubble bubble-1">
                    <div class="bubble-inner">昨天有10个人拜访了您哦</div>
                </div>
                <div class="bubble bubble-2">
                    <div class="bubble-inner">昨天收到了24个赞！</div>
                </div>
                <div class="bubble bubble-3">
                    <div class="bubble-inner">昨天帮您耐心解答了30个学术困惑，大家反馈受益匪浅！</div>
                </div>
            </div>
        </div>
        <a href="twin-manage.html" class="primary-button view-btn" style="text-align: center;">查看详细报告</a>
    </div>

    <script>
        document.getElementById('bind-btn').addEventListener('click', () => {
            const loginSection = document.getElementById('login-section');
            const loadingSection = document.getElementById('loading-section');
            const resultSection = document.getElementById('result-section');
            
            // Hide login, show loading
            loginSection.classList.remove('active');
            loadingSection.classList.add('active');

            // Wait for top-to-bottom wipe animation (3s) + slight buffer
            setTimeout(() => {
                loadingSection.classList.remove('active');
                resultSection.classList.add('active');
            }, 3200);
        });
    </script>
</body>
</html>
